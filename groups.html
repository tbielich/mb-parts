<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MB Teilegruppen</title>
  </head>
  <body>
    <main class="groups-app">
      <header class="groups-header">
        <div>
          <h1>MB Teilegruppen</h1>
          <p class="groups-subtitle">Grafik + Teileliste nach Gruppe und Unterseite</p>
        </div>
        <a class="back-link" href="/">Zurück zur Teileliste</a>
      </header>

      <p id="groups-status" class="groups-status" role="status" aria-live="polite" aria-atomic="true">Lade Gruppen...</p>

      <div class="groups-layout">
        <aside class="groups-sidebar" aria-label="Gruppen und Unterseiten">
          <h2>Gruppen</h2>
          <div id="group-list" class="group-list"></div>
        </aside>

        <section class="groups-content" aria-label="Diagramm und Teile">
          <h2 id="selection-title">Bitte Gruppe wählen</h2>
          <div class="diagram-card">
            <div class="diagram-toolbar">
              <a id="diagram-open-link" href="#" target="_blank" rel="noopener">Original öffnen</a>
            </div>
            <div class="diagram-wrap">
              <img id="diagram-image" alt="Teilegrafik" loading="lazy" usemap="#diagram-map" />
              <map id="diagram-map" name="diagram-map"></map>
            </div>
          </div>

          <div class="parts-card">
            <table>
              <thead>
                <tr>
                  <th scope="col">Pos.</th>
                  <th scope="col">Artikelnummer</th>
                  <th scope="col">Name</th>
                  <th scope="col">Preis</th>
                  <th scope="col">Verfügbarkeit</th>
                  <th scope="col">Link</th>
                </tr>
              </thead>
              <tbody id="diagram-parts-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/groups.ts"></script>
  </body>
</html>
